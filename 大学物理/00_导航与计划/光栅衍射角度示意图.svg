<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#123a5c"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#b23b3b"/>
    </marker>
    <style>
      .title { font: 700 30px "Microsoft YaHei", "SimHei", sans-serif; fill: #0b2f4f; }
      .label { font: 22px "Microsoft YaHei", "SimHei", sans-serif; fill: #102a43; }
      .small { font: 18px "Microsoft YaHei", "SimHei", sans-serif; fill: #334e68; }
      .math { font: italic 22px "Times New Roman", serif; fill: #102a43; }
      .line { stroke: #123a5c; stroke-width: 4; fill: none; }
      .ray { stroke: #1f7a8c; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .red { stroke: #b23b3b; stroke-width: 4; fill: none; marker-end: url(#arrowRed); }
      .dash { stroke: #778899; stroke-width: 3; stroke-dasharray: 10 8; fill: none; }
      .dim { stroke: #0b2f4f; stroke-width: 3; marker-start: url(#arrow); marker-end: url(#arrow); }
      .panel { fill: #fbfaf6; stroke: #d9cbb8; stroke-width: 2; rx: 18; }
    </style>
  </defs>

  <rect x="20" y="20" width="1060" height="680" class="panel"/>
  <text x="55" y="75" class="title">光栅衍射里 θ、d sinθ、a sinθ 是怎么来的</text>

  <!-- grating plane -->
  <line x1="210" y1="125" x2="210" y2="610" stroke="#333" stroke-width="10"/>
  <rect x="205" y="180" width="10" height="54" fill="#fbfaf6"/>
  <rect x="205" y="330" width="10" height="54" fill="#fbfaf6"/>
  <rect x="205" y="480" width="10" height="54" fill="#fbfaf6"/>
  <text x="75" y="155" class="label">光栅平面</text>

  <!-- slit centers -->
  <circle cx="210" cy="207" r="6" fill="#b23b3b"/>
  <circle cx="210" cy="357" r="6" fill="#b23b3b"/>
  <circle cx="210" cy="507" r="6" fill="#b23b3b"/>

  <!-- normal line -->
  <line x1="210" y1="357" x2="785" y2="357" class="dash"/>
  <text x="790" y="365" class="small">法线方向</text>

  <!-- rays from neighboring slits -->
  <line x1="210" y1="357" x2="760" y2="170" class="ray"/>
  <line x1="210" y1="207" x2="760" y2="20" class="ray"/>
  <text x="785" y="145" class="label">同一个观察方向</text>
  <text x="785" y="175" class="math">θ</text>

  <!-- angle arc -->
  <path d="M310 357 A100 100 0 0 0 305 325" stroke="#b23b3b" stroke-width="4" fill="none"/>
  <text x="325" y="333" class="math">θ</text>

  <!-- d dimension between centers -->
  <line x1="165" y1="207" x2="165" y2="357" class="dim"/>
  <text x="125" y="290" class="math">d</text>
  <text x="70" y="392" class="small">相邻两缝中心距</text>

  <!-- a dimension for one slit -->
  <line x1="245" y1="180" x2="245" y2="234" class="dim"/>
  <text x="258" y="214" class="math">a</text>
  <text x="265" y="245" class="small">单缝宽度</text>

  <!-- path difference triangles -->
  <line x1="210" y1="207" x2="260" y2="357" class="dash"/>
  <line x1="210" y1="357" x2="260" y2="357" class="dash"/>
  <text x="275" y="300" class="small">投影出来的光程差</text>
  <text x="276" y="330" class="math">d sinθ</text>

  <!-- single slit subrays -->
  <line x1="210" y1="180" x2="575" y2="58" class="red"/>
  <line x1="210" y1="234" x2="575" y2="112" class="red"/>
  <line x1="210" y1="180" x2="230" y2="234" class="dash"/>
  <line x1="210" y1="234" x2="230" y2="234" class="dash"/>
  <text x="585" y="98" class="small">同一条缝内部上下部分也会有光程差</text>
  <text x="585" y="128" class="math">a sinθ</text>

  <!-- formulas -->
  <rect x="55" y="610" width="990" height="62" fill="#eef6fb" stroke="#c3dcea" stroke-width="2" rx="12"/>
  <text x="80" y="649" class="label">主极大：d sinθ = kλ　　　单缝极小：a sinθ = mλ　　　缺级：k = m d/a</text>
</svg>
