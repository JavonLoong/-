<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#fbfbff"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#111827">Infinite Square Well</text>

  <path d="M100 320 L100 110 L130 110 L130 320 L410 320 L410 110 L440 110 L440 320" fill="none" stroke="#111827" stroke-width="5"/>
  <text x="82" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#374151">infinite wall</text>
  <text x="405" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#374151">infinite wall</text>
  <text x="112" y="348" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#374151">x = 0</text>
  <text x="392" y="348" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#374151">x = a</text>

  <line x1="130" y1="280" x2="410" y2="280" stroke="#9ca3af" stroke-width="2"/>
  <line x1="130" y1="220" x2="410" y2="220" stroke="#9ca3af" stroke-width="2"/>
  <line x1="130" y1="160" x2="410" y2="160" stroke="#9ca3af" stroke-width="2"/>
  <text x="425" y="166" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#374151">E3</text>
  <text x="425" y="226" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#374151">E2</text>
  <text x="425" y="286" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#374151">E1</text>

  <path d="M130 280 C200 225,270 225,340 280 C375 307,393 307,410 280" fill="none" stroke="#2563eb" stroke-width="4"/>
  <path d="M130 220 C165 165,200 165,235 220 C270 275,305 275,340 220 C375 165,393 165,410 220" fill="none" stroke="#ef4444" stroke-width="4"/>
  <text x="150" y="252" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#1d4ed8">n = 1</text>
  <text x="150" y="192" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#b91c1c">n = 2</text>

  <rect x="560" y="92" width="320" height="250" rx="14" fill="#eef2ff" stroke="#a5b4fc" stroke-width="3"/>
  <text x="600" y="136" font-family="Cambria Math, Microsoft YaHei, serif" font-size="22" fill="#111827">ψₙ(x) = √(2/a) sin(nπx/a)</text>
  <text x="600" y="176" font-family="Cambria Math, Microsoft YaHei, serif" font-size="22" fill="#111827">Eₙ = n²h² / (8ma²)</text>
  <text x="600" y="216" font-family="Cambria Math, Microsoft YaHei, serif" font-size="22" fill="#111827">Ψ(x,t) = Σcₙψₙ e^(−iEₙt/ħ)</text>
  <text x="600" y="256" font-family="Cambria Math, Microsoft YaHei, serif" font-size="22" fill="#111827">P(Eₙ) = |cₙ|²</text>
  <text x="600" y="296" font-family="Cambria Math, Microsoft YaHei, serif" font-size="22" fill="#111827">Ē = Σ|cₙ|²Eₙ</text>
</svg>
