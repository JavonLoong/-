<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640">
  <rect width="1200" height="640" fill="#f8f4ed"/>
  <rect x="32" y="28" width="1136" height="584" rx="28" fill="#fffdf8" stroke="#d9d1c3" stroke-width="2"/>
  <text x="60" y="82" font-family="Georgia, Microsoft YaHei, serif" font-size="32" fill="#1f2937">势阱题标准流程：初态 → 展开 → 演化 → 概率</text>
  <rect x="72" y="132" width="270" height="390" rx="24" fill="#fff8ef" stroke="#e5cfab" stroke-width="2"/>
  <text x="96" y="174" font-family="Georgia, Microsoft YaHei, serif" font-size="24" fill="#9f4f2b">1. 看初态</text>
  <rect x="118" y="230" width="150" height="150" rx="12" fill="#eef2ff" stroke="#a5b4fc" stroke-width="2"/>
  <path d="M130 350 C160 300,190 250,220 250 C245 250,258 300,258 350" fill="none" stroke="#ef4444" stroke-width="4"/>
  <text x="108" y="424" font-family="Cambria Math, Microsoft YaHei, serif" font-size="22" fill="#1f2937">Ψ(x,0)</text>
  <text x="96" y="462" font-family="Microsoft YaHei, sans-serif" font-size="17" fill="#5b6472">先判断是不是本征态，还是线性组合。</text>
  <rect x="464" y="132" width="300" height="390" rx="24" fill="#f1fbfa" stroke="#afd4d7" stroke-width="2"/>
  <text x="488" y="174" font-family="Georgia, Microsoft YaHei, serif" font-size="24" fill="#1f6b73">2. 展开成本征态</text>
  <rect x="502" y="230" width="220" height="72" rx="16" fill="#fff" stroke="#d7ecec"/>
  <text x="548" y="274" font-family="Cambria Math, Microsoft YaHei, serif" font-size="24" fill="#1f2937">c₁ψ₁(x)</text>
  <rect x="502" y="330" width="220" height="72" rx="16" fill="#fff" stroke="#d7ecec"/>
  <text x="548" y="374" font-family="Cambria Math, Microsoft YaHei, serif" font-size="24" fill="#1f2937">c₂ψ₂(x)</text>
  <text x="496" y="456" font-family="Cambria Math, Microsoft YaHei, serif" font-size="22" fill="#1f2937">Ψ(x,0)=Σcₙψₙ(x)</text>
  <rect x="884" y="132" width="250" height="390" rx="24" fill="#f6fbef" stroke="#b6d08d" stroke-width="2"/>
  <text x="908" y="174" font-family="Georgia, Microsoft YaHei, serif" font-size="24" fill="#4b7a2a">3. 输出结果</text>
  <rect x="912" y="222" width="190" height="72" rx="16" fill="#fff" stroke="#d9e9bc"/>
  <text x="934" y="266" font-family="Cambria Math, Microsoft YaHei, serif" font-size="22" fill="#1f2937">e^(−iEₙt/ħ)</text>
  <rect x="912" y="322" width="190" height="72" rx="16" fill="#fff" stroke="#d9e9bc"/>
  <text x="938" y="366" font-family="Cambria Math, Microsoft YaHei, serif" font-size="22" fill="#1f2937">P(Eₙ)=|cₙ|²</text>
  <rect x="912" y="422" width="190" height="72" rx="16" fill="#fff" stroke="#d9e9bc"/>
  <text x="936" y="466" font-family="Cambria Math, Microsoft YaHei, serif" font-size="22" fill="#1f2937">Ē=Σ|cₙ|²Eₙ</text>
  <line x1="342" y1="328" x2="464" y2="328" stroke="#c38b50" stroke-width="5"/>
  <polygon points="464,328 444,316 444,340" fill="#c38b50"/>
  <line x1="764" y1="328" x2="884" y2="328" stroke="#5b9aa2" stroke-width="5"/>
  <polygon points="884,328 864,316 864,340" fill="#5b9aa2"/>
</svg>
