<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#fffdf8"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#111827">Hydrogen Atom Energy Levels</text>

  <line x1="150" y1="340" x2="520" y2="340" stroke="#111827" stroke-width="3"/>
  <line x1="150" y1="260" x2="520" y2="260" stroke="#374151" stroke-width="2.5"/>
  <line x1="150" y1="210" x2="520" y2="210" stroke="#4b5563" stroke-width="2"/>
  <line x1="150" y1="175" x2="520" y2="175" stroke="#6b7280" stroke-width="2"/>
  <line x1="150" y1="150" x2="520" y2="150" stroke="#9ca3af" stroke-width="2"/>
  <line x1="150" y1="128" x2="520" y2="128" stroke="#d1d5db" stroke-width="2"/>

  <text x="540" y="346" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#111827">n = 1  E1 = -13.6 eV</text>
  <text x="540" y="266" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#374151">n = 2  E2 = -3.40 eV</text>
  <text x="540" y="216" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4b5563">n = 3  E3 = -1.51 eV</text>
  <text x="540" y="181" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#6b7280">n = 4  E4 = -0.85 eV</text>
  <text x="540" y="156" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#9ca3af">n = 5</text>
  <text x="540" y="134" font-family="Cambria Math, Microsoft YaHei, serif" font-size="18" fill="#9ca3af">n → ∞</text>

  <line x1="320" y1="175" x2="260" y2="260" stroke="#ef4444" stroke-width="4"/>
  <polygon points="260,260 255,247 271,252" fill="#ef4444"/>
  <line x1="290" y1="210" x2="230" y2="340" stroke="#2563eb" stroke-width="4"/>
  <polygon points="230,340 224,326 240,331" fill="#2563eb"/>
  <line x1="400" y1="260" x2="350" y2="340" stroke="#10b981" stroke-width="4"/>
  <polygon points="350,340 345,327 360,332" fill="#10b981"/>
  <text x="200" y="242" font-family="Cambria Math, Microsoft YaHei, serif" font-size="18" fill="#b91c1c">4 → 2</text>
  <text x="175" y="300" font-family="Cambria Math, Microsoft YaHei, serif" font-size="18" fill="#1d4ed8">3 → 1</text>
  <text x="358" y="292" font-family="Cambria Math, Microsoft YaHei, serif" font-size="18" fill="#047857">2 → 1</text>

  <rect x="80" y="84" width="300" height="54" rx="10" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="100" y="118" font-family="Cambria Math, Microsoft YaHei, serif" font-size="20" fill="#111827">Eₙ = −13.6 / n² (eV)</text>

  <rect x="80" y="360" width="830" height="36" rx="10" fill="#ecfccb" stroke="#bef264" stroke-width="2"/>
  <text x="98" y="384" font-family="Cambria Math, Microsoft YaHei, serif" font-size="18" fill="#111827">最多谱线：n(n − 1)/2；L = √(l(l+1)) ħ；Lz = mₗ ħ</text>
</svg>
