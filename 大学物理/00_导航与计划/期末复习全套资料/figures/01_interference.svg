<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360">
  <rect width="960" height="360" fill="#fbfbf8"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#1f2937">Double-Slit Interference</text>

  <circle cx="90" cy="180" r="18" fill="#f59e0b"/>
  <text x="58" y="225" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#374151">Source</text>

  <rect x="250" y="65" width="16" height="230" rx="3" fill="#4b5563"/>
  <rect x="250" y="128" width="16" height="22" fill="#fbfbf8"/>
  <rect x="250" y="210" width="16" height="22" fill="#fbfbf8"/>
  <text x="205" y="330" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#374151">slits</text>

  <line x1="108" y1="180" x2="250" y2="139" stroke="#60a5fa" stroke-width="3"/>
  <line x1="108" y1="180" x2="250" y2="221" stroke="#f87171" stroke-width="3"/>

  <line x1="258" y1="139" x2="770" y2="120" stroke="#60a5fa" stroke-width="3"/>
  <line x1="258" y1="221" x2="770" y2="240" stroke="#f87171" stroke-width="3"/>

  <rect x="770" y="55" width="18" height="250" rx="3" fill="#111827"/>
  <text x="728" y="330" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#374151">screen</text>

  <rect x="788" y="76" width="76" height="208" fill="#fffdf7" stroke="#d1d5db"/>
  <rect x="790" y="95" width="72" height="12" fill="#fbbf24"/>
  <rect x="790" y="121" width="72" height="7" fill="#fde68a"/>
  <rect x="790" y="144" width="72" height="12" fill="#fbbf24"/>
  <rect x="790" y="170" width="72" height="7" fill="#fde68a"/>
  <rect x="790" y="193" width="72" height="12" fill="#fbbf24"/>
  <rect x="790" y="219" width="72" height="7" fill="#fde68a"/>
  <rect x="790" y="242" width="72" height="12" fill="#fbbf24"/>

  <line x1="274" y1="139" x2="274" y2="221" stroke="#10b981" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="228" y1="139" x2="228" y2="221" stroke="#10b981" stroke-width="2"/>
  <line x1="222" y1="139" x2="234" y2="139" stroke="#10b981" stroke-width="2"/>
  <line x1="222" y1="221" x2="234" y2="221" stroke="#10b981" stroke-width="2"/>
  <text x="194" y="186" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#047857">d</text>

  <line x1="275" y1="284" x2="769" y2="284" stroke="#2563eb" stroke-width="2"/>
  <polygon points="275,284 287,278 287,290" fill="#2563eb"/>
  <polygon points="769,284 757,278 757,290" fill="#2563eb"/>
  <text x="508" y="274" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1d4ed8">D</text>

  <line x1="820" y1="170" x2="890" y2="170" stroke="#ef4444" stroke-width="2"/>
  <line x1="855" y1="150" x2="855" y2="190" stroke="#ef4444" stroke-width="2"/>
  <text x="898" y="176" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#b91c1c">x</text>

  <text x="350" y="78" font-family="Cambria Math, Microsoft YaHei, serif" font-size="22" fill="#111827">δ ≈ dx / D</text>
  <text x="348" y="108" font-family="Cambria Math, Microsoft YaHei, serif" font-size="20" fill="#111827">亮纹：δ = kλ</text>
  <text x="348" y="136" font-family="Cambria Math, Microsoft YaHei, serif" font-size="20" fill="#111827">暗纹：δ = (k + 1/2)λ</text>
  <text x="348" y="164" font-family="Cambria Math, Microsoft YaHei, serif" font-size="20" fill="#111827">Δx = λD / d</text>
</svg>
