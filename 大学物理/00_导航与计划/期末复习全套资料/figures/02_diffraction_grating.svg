<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#f9fafb"/>
  <text x="40" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#111827">Single-Slit Diffraction and Grating</text>

  <text x="90" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#374151">single slit</text>
  <rect x="90" y="110" width="16" height="180" rx="3" fill="#4b5563"/>
  <rect x="90" y="172" width="16" height="56" fill="#f9fafb"/>
  <line x1="30" y1="200" x2="90" y2="200" stroke="#60a5fa" stroke-width="4"/>
  <text x="56" y="165" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1d4ed8">a</text>
  <line x1="114" y1="200" x2="365" y2="200" stroke="#9ca3af" stroke-width="2"/>
  <rect x="365" y="90" width="14" height="220" rx="3" fill="#111827"/>
  <text x="330" y="335" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#374151">screen</text>
  <path d="M380 120 C405 145,420 170,434 200 C420 230,405 255,380 280" fill="none" stroke="#f59e0b" stroke-width="9"/>
  <path d="M380 145 C392 160,398 180,404 200 C398 220,392 240,380 255" fill="none" stroke="#fcd34d" stroke-width="6"/>
  <text x="150" y="330" font-family="Cambria Math, Microsoft YaHei, serif" font-size="18" fill="#111827">a sinθ = mλ</text>
  <text x="150" y="356" font-family="Cambria Math, Microsoft YaHei, serif" font-size="18" fill="#111827">中央明纹宽：2fλ / a</text>

  <line x1="480" y1="70" x2="480" y2="360" stroke="#d1d5db" stroke-width="2"/>

  <text x="560" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#374151">grating</text>
  <rect x="550" y="110" width="18" height="180" rx="3" fill="#4b5563"/>
  <rect x="550" y="128" width="18" height="16" fill="#f9fafb"/>
  <rect x="550" y="158" width="18" height="16" fill="#f9fafb"/>
  <rect x="550" y="188" width="18" height="16" fill="#f9fafb"/>
  <rect x="550" y="218" width="18" height="16" fill="#f9fafb"/>
  <rect x="550" y="248" width="18" height="16" fill="#f9fafb"/>
  <line x1="490" y1="200" x2="550" y2="200" stroke="#60a5fa" stroke-width="4"/>
  <text x="582" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#047857">spacing d</text>

  <line x1="568" y1="200" x2="850" y2="200" stroke="#9ca3af" stroke-width="2"/>
  <rect x="850" y="90" width="14" height="220" rx="3" fill="#111827"/>
  <rect x="868" y="112" width="50" height="8" fill="#fde68a"/>
  <rect x="868" y="150" width="50" height="20" fill="#f59e0b"/>
  <rect x="868" y="194" width="50" height="32" fill="#d97706"/>
  <rect x="868" y="250" width="50" height="20" fill="#f59e0b"/>
  <rect x="868" y="288" width="50" height="8" fill="#fde68a"/>

  <path d="M570 200 L820 155" stroke="#ef4444" stroke-width="2.5"/>
  <path d="M570 200 L820 200" stroke="#ef4444" stroke-width="2.5"/>
  <path d="M570 200 L820 245" stroke="#ef4444" stroke-width="2.5"/>
  <path d="M640 200 A70 70 0 0 1 638 187" fill="none" stroke="#10b981" stroke-width="2"/>
  <text x="650" y="182" font-family="Cambria Math, Microsoft YaHei, serif" font-size="18" fill="#047857">θ</text>

  <text x="585" y="330" font-family="Cambria Math, Microsoft YaHei, serif" font-size="18" fill="#111827">d sinθ = kλ</text>
  <text x="585" y="356" font-family="Cambria Math, Microsoft YaHei, serif" font-size="18" fill="#111827">R = λ / Δλ = kN</text>
  <text x="585" y="382" font-family="Cambria Math, Microsoft YaHei, serif" font-size="18" fill="#111827">缺级：k = md / a</text>
</svg>
