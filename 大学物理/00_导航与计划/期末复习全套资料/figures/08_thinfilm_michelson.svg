<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640">
  <rect width="1200" height="640" fill="#f8f4ed"/>
  <rect x="32" y="28" width="1136" height="584" rx="28" fill="#fffdf8" stroke="#d9d1c3" stroke-width="2"/>
  <text x="60" y="82" font-family="Georgia, Microsoft YaHei, serif" font-size="32" fill="#1f2937">薄膜干涉与迈克耳孙：两类光程差一图分清</text>
  <rect x="70" y="124" width="500" height="430" rx="24" fill="#fff8ef" stroke="#e5cfab" stroke-width="2"/>
  <text x="96" y="166" font-family="Georgia, Microsoft YaHei, serif" font-size="25" fill="#9f4f2b">反射型薄膜：先判断半波损失</text>
  <rect x="130" y="245" width="330" height="70" fill="#f6d58a"/>
  <rect x="130" y="315" width="330" height="118" fill="#d8c7fb"/>
  <line x1="98" y1="198" x2="198" y2="245" stroke="#ef4444" stroke-width="4"/>
  <line x1="198" y1="245" x2="104" y2="216" stroke="#ef4444" stroke-width="4"/>
  <line x1="198" y1="245" x2="300" y2="432" stroke="#2563eb" stroke-width="4"/>
  <line x1="300" y1="432" x2="430" y2="245" stroke="#2563eb" stroke-width="4"/>
  <line x1="430" y1="245" x2="548" y2="210" stroke="#2563eb" stroke-width="4"/>
  <text x="96" y="224" font-family="Microsoft YaHei, sans-serif" font-size="17" fill="#b91c1c">反射光 1</text>
  <text x="410" y="224" font-family="Microsoft YaHei, sans-serif" font-size="17" fill="#1d4ed8">反射光 2</text>
  <text x="470" y="288" font-family="Microsoft YaHei, sans-serif" font-size="17" fill="#374151">膜厚 t</text>
  <text x="112" y="492" font-family="Cambria Math, Microsoft YaHei, serif" font-size="24" fill="#1f2937">先写 δ = 2nt，再看反射相位反转次数</text>
  <text x="112" y="524" font-family="Microsoft YaHei, sans-serif" font-size="17" fill="#5b6472">一次反转会让反射增强 / 减弱条件交换。</text>
  <rect x="630" y="124" width="500" height="430" rx="24" fill="#f1fbfa" stroke="#afd4d7" stroke-width="2"/>
  <text x="656" y="166" font-family="Georgia, Microsoft YaHei, serif" font-size="25" fill="#1f6b73">迈克耳孙：镜子动一下，光走两趟</text>
  <circle cx="700" cy="330" r="18" fill="#f59e0b"/>
  <rect x="765" y="312" width="34" height="34" transform="rotate(45 782 329)" fill="#c7d2fe" stroke="#6366f1" stroke-width="2"/>
  <rect x="925" y="215" width="18" height="130" rx="4" fill="#475569"/>
  <rect x="810" y="165" width="130" height="18" rx="4" fill="#475569"/>
  <line x1="718" y1="330" x2="765" y2="330" stroke="#f59e0b" stroke-width="4"/>
  <line x1="799" y1="328" x2="925" y2="280" stroke="#ef4444" stroke-width="4"/>
  <line x1="782" y1="312" x2="875" y2="183" stroke="#2563eb" stroke-width="4"/>
  <line x1="943" y1="252" x2="990" y2="252" stroke="#b91c1c" stroke-width="3"/>
  <line x1="943" y1="312" x2="990" y2="312" stroke="#b91c1c" stroke-width="3"/>
  <line x1="982" y1="252" x2="982" y2="312" stroke="#b91c1c" stroke-width="3"/>
  <text x="996" y="288" font-family="Cambria Math, Microsoft YaHei, serif" font-size="24" fill="#b91c1c">Δd</text>
  <text x="672" y="368" font-family="Microsoft YaHei, sans-serif" font-size="17" fill="#374151">光源</text>
  <text x="808" y="150" font-family="Microsoft YaHei, sans-serif" font-size="17" fill="#374151">镜 M1</text>
  <text x="948" y="286" font-family="Microsoft YaHei, sans-serif" font-size="17" fill="#374151">镜 M2</text>
  <text x="674" y="492" font-family="Cambria Math, Microsoft YaHei, serif" font-size="25" fill="#1f2937">光程差变化：2Δd，所以 2Δd = Nλ</text>
  <text x="674" y="524" font-family="Microsoft YaHei, sans-serif" font-size="17" fill="#5b6472">这类题最常见失分就是漏掉前面的 2。</text>
</svg>
