  <text x="742" y="145" font-family="Cambria Math, Microsoft YaHei, serif" font-size="18" fill="#374151">Δx</text>
  <text x="842" y="160" font-family="Cambria Math, Microsoft YaHei, serif" font-size="18" fill="#374151">Δpₓ 展宽</text>
  <text x="684" y="310" font-family="Cambria Math, Microsoft YaHei, serif" font-size="18" fill="#111827">λ = h / p</text>
  <text x="684" y="338" font-family="Cambria Math, Microsoft YaHei, serif" font-size="18" fill="#111827">ΔxΔpₓ ≥ ħ / 2</text>
