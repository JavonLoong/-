  <rect x="810" y="155" width="12" height="110" fill="#475569"/>
  <line x1="665" y1="210" x2="705" y2="210" stroke="#2563eb" stroke-width="4"/>
  <line x1="822" y1="210" x2="900" y2="170" stroke="#2563eb" stroke-width="4"/>
