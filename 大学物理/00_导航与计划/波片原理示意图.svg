<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#143d5a"/>
    </marker>
    <style>
      .bg { fill: #fbfaf6; stroke: #d8cbb8; stroke-width: 2; rx: 18; }
      .title { font: 700 30px "Microsoft YaHei", "SimHei", sans-serif; fill: #0b2f4f; }
      .label { font: 22px "Microsoft YaHei", "SimHei", sans-serif; fill: #102a43; }
      .small { font: 18px "Microsoft YaHei", "SimHei", sans-serif; fill: #334e68; }
      .math { font: italic 22px "Times New Roman", serif; fill: #102a43; }
      .axis { stroke: #2f3e46; stroke-width: 3; marker-end: url(#arrow); }
      .dash { stroke: #7b8794; stroke-width: 3; stroke-dasharray: 8 7; }
      .ray { stroke: #176b87; stroke-width: 5; marker-end: url(#arrow); fill: none; }
      .red { stroke: #b23b3b; stroke-width: 5; marker-end: url(#arrow); fill: none; }
      .green { stroke: #2a7f62; stroke-width: 5; marker-end: url(#arrow); fill: none; }
      .crystal { fill: #e4f2f7; stroke: #2d6a7f; stroke-width: 4; rx: 10; }
      .box { fill: #eef6fb; stroke: #c3dcea; stroke-width: 2; rx: 12; }
    </style>
  </defs>

  <rect x="20" y="20" width="1140" height="720" class="bg"/>
  <text x="55" y="74" class="title">波片原理：把一束光拆成“快轴分量”和“慢轴分量”</text>

  <!-- left: decomposition -->
  <text x="70" y="125" class="label">1. 入射线偏振光先分解到快轴、慢轴</text>
  <line x1="150" y1="350" x2="420" y2="350" class="axis"/>
  <line x1="150" y1="350" x2="150" y2="115" class="axis"/>
  <text x="425" y="358" class="small">快轴</text>
  <text x="118" y="110" class="small">慢轴</text>
  <line x1="150" y1="350" x2="335" y2="165" class="ray"/>
  <line x1="150" y1="350" x2="335" y2="350" class="red"/>
  <line x1="335" y1="350" x2="335" y2="165" class="green"/>
  <text x="350" y="172" class="small">入射电场 E</text>
  <text x="275" y="382" class="small">快轴分量</text>
  <text x="345" y="260" class="small">慢轴分量</text>
  <path d="M215 350 A65 65 0 0 0 196 304" stroke="#b23b3b" stroke-width="4" fill="none"/>
  <text x="226" y="319" class="math">α</text>

  <!-- middle: crystal -->
  <text x="505" y="125" class="label">2. 进晶体后，一个快，一个慢</text>
  <rect x="600" y="195" width="160" height="280" class="crystal"/>
  <line x1="500" y1="335" x2="600" y2="335" class="ray"/>
  <line x1="760" y1="315" x2="900" y2="315" class="red"/>
  <line x1="760" y1="365" x2="900" y2="365" class="green"/>
  <line x1="680" y1="205" x2="680" y2="465" class="dash"/>
  <text x="694" y="250" class="small">厚度 t</text>
  <text x="785" y="300" class="small">快轴分量先出来</text>
  <text x="785" y="392" class="small">慢轴分量落后</text>
  <text x="510" y="520" class="label">相位差：</text>
  <text x="620" y="520" class="math">Δφ = 2π Δn t / λ</text>

  <!-- right: outputs -->
  <text x="70" y="585" class="label">3. 两种特殊厚度</text>
  <rect x="70" y="610" width="500" height="82" class="box"/>
  <text x="95" y="646" class="small">四分之一波片：Δn t = λ/4 → Δφ = π/2</text>
  <text x="95" y="676" class="small">45° 入射时，线偏振可变成圆偏振；一般变椭圆偏振</text>
  <rect x="610" y="610" width="500" height="82" class="box"/>
  <text x="635" y="646" class="small">二分之一波片：Δn t = λ/2 → Δφ = π</text>
  <text x="635" y="676" class="small">线偏振仍是线偏振，但方向会被旋转</text>
</svg>
